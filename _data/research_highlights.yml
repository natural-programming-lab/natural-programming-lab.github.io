# Research Highlight cards on the homepage (_includes/research-highlight-cards.html)
- title: "mrCAD: Multimodal Refinement of Computer-aided Designs"
  title_url: "https://arxiv.org/abs/2504.20294"
  authors: "William P. McCarthy, Saujas Vaduguru, Karl D. D. Willis, Justin Matejka, Judith E. Fan, Daniel Fried, Yewen Pu"
  venue_line: "EMNLP 2025"
  excerpt: "A dataset of multimodal instructions for iteratively refining computer-aided designs (CADs): designers instruct makers using text, drawing, or both across thousands of human games—highlighting how refinement differs from generation and benchmarking VLMs on instruction following."
  paper_url: "https://arxiv.org/abs/2504.20294"
  website_url: ""
  image: /images/highlights/mrcad-teaser.png
  tags:
    - cad
    - multimodal
    - human-ai-collaboration

- title: "When Robots Should Say \"I Don't Know\": Benchmarking Abstention in Embodied Question Answering"
  title_url: "https://arxiv.org/abs/2512.04597"
  authors: "Tao Wu, Chuhao Zhou, Guangyu Zhao, Haozhi Cao, Yewen Pu, Jianfei Yang"
  venue_line: "CVPR 2026 (Highlight)"
  excerpt: "Embodied agents should know when to withhold an answer. We introduce AbstainEQA—1.6k abstention cases paired with OpenEQA—covering actionability limits, referential underspecification, and more. Frontier models reach only 42.79% abstention recall vs. 91.17% for humans."
  paper_url: "https://arxiv.org/abs/2512.04597"
  website_url: ""
  image: /images/highlights/abstain-eqa.png
  tags:
    - embodied-qa
    - abstention
    - robotics
    - eqa
